name: duka_letu
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you intend to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ✅ Latest Firebase packages (work with Dart 3.5+ / Flutter 3.27+)
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.5.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Cloudinary for image uploads
  cloudinary_public: ^0.23.1
  
  # State management
  provider: ^6.1.1
  
  # UI packages
  cupertino_icons: ^1.0.2
  font_awesome_flutter: ^10.7.0
  image_picker: ^1.0.5
  smooth_page_indicator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/


